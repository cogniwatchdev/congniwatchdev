<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CogniWatch - AI Agent Detection Network{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        navy: {
                            DEFAULT: '#001f3f',
                            light: '#003366',
                            lighter: '#004d99'
                        },
                        teal: '#39cccc',
                        cyan: '#7fdbff',
                        white: '#ffffff',
                        gray: '#b0bec5',
                        green: '#22c55e',
                        yellow: '#f59e0b',
                        red: '#ef4444'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace']
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    
    <!-- Custom Styles -->
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .sidebar {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-collapsed {
            width: 60px;
        }
        .sidebar-expanded {
            width: 250px;
        }
        .nav-item {
            transition: all 0.2s ease;
        }
        .nav-item:hover {
            background: rgba(57, 204, 204, 0.1);
        }
        .nav-item.active {
            background: rgba(57, 204, 204, 0.2);
            border-left: 3px solid #39cccc;
        }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-navy text-white font-sans min-h-screen overflow-hidden">
    <div id="app" class="flex min-h-screen">
        
        <!-- Left Sidebar Navigation -->
        <aside id="sidebar" class="sidebar bg-navy-light border-r border-teal/10 flex-shrink-0">
            <!-- Sidebar Header -->
            <div class="p-4 border-b border-teal/10">
                <div class="flex items-center gap-3">
                    <img src="/static/logos/cogniwatch-logo.png" alt="CogniWatch" class="w-10 h-10">
                    <span class="logo-text font-bold text-lg text-teal sidebar-text">CogniWatch</span>
                </div>
            </div>
            
            <!-- Navigation Menu -->
            <nav class="flex-1 p-2">
                <a href="/dashboard" class="nav-item flex items-center gap-3 px-3 py-3 rounded-lg mb-1 {% if active_page == 'dashboard' %}active{% endif %}">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 text-teal"></i>
                    <span class="sidebar-text">Dashboard</span>
                </a>
                
                <a href="/scan" class="nav-item flex items-center gap-3 px-3 py-3 rounded-lg mb-1 {% if active_page == 'scan' %}active{% endif %}">
                    <i data-lucide="scan" class="w-5 h-5 text-teal"></i>
                    <span class="sidebar-text">Scan</span>
                </a>
                
                <a href="/agents" class="nav-item flex items-center gap-3 px-3 py-3 rounded-lg mb-1 {% if active_page == 'agents' %}active{% endif %}">
                    <i data-lucide="cpu" class="w-5 h-5 text-teal"></i>
                    <span class="sidebar-text">Agents</span>
                </a>
                
                <a href="/analytics" class="nav-item flex items-center gap-3 px-3 py-3 rounded-lg mb-1 {% if active_page == 'analytics' %}active{% endif %}">
                    <i data-lucide="chart-bar" class="w-5 h-5 text-teal"></i>
                    <span class="sidebar-text">Analytics</span>
                </a>
                
                <a href="/security" class="nav-item flex items-center gap-3 px-3 py-3 rounded-lg mb-1 {% if active_page == 'security' %}active{% endif %}">
                    <i data-lucide="shield-alert" class="w-5 h-5 text-teal"></i>
                    <span class="sidebar-text">Security</span>
                </a>
                
                <div class="my-4 border-t border-teal/10"></div>
                
                <a href="/faq" class="nav-item flex items-center gap-3 px-3 py-3 rounded-lg mb-1 {% if active_page == 'faq' %}active{% endif %}">
                    <i data-lucide="help-circle" class="w-5 h-5 text-cyan"></i>
                    <span class="sidebar-text">FAQ</span>
                </a>
                
                <a href="/about" class="nav-item flex items-center gap-3 px-3 py-3 rounded-lg mb-1 {% if active_page == 'about' %}active{% endif %}">
                    <i data-lucide="info" class="w-5 h-5 text-cyan"></i>
                    <span class="sidebar-text">About</span>
                </a>
                
                <a href="/help" class="nav-item flex items-center gap-3 px-3 py-3 rounded-lg mb-1 {% if active_page == 'help' %}active{% endif %}">
                    <i data-lucide="book-open" class="w-5 h-5 text-cyan"></i>
                    <span class="sidebar-text">Help</span>
                </a>
                
                <a href="/settings" class="nav-item flex items-center gap-3 px-3 py-3 rounded-lg mb-1 {% if active_page == 'settings' %}active{% endif %}">
                    <i data-lucide="settings" class="w-5 h-5 text-cyan"></i>
                    <span class="sidebar-text">Settings</span>
                </a>
            </nav>
            
            <!-- Sidebar Footer -->
            <div class="p-4 border-t border-teal/10">
                <div class="text-xs text-gray sidebar-text">v0.3.0 • 2026</div>
            </div>
        </aside>
        
        <!-- Main Content Area -->
        <main id="main-content" class="flex-1 overflow-hidden">
            <!-- Top Bar -->
            <header class="bg-navy-lighter border-b border-teal/10 p-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button id="toggle-sidebar" class="p-2 hover:bg-teal/10 rounded-lg">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                    <h1 class="text-xl font-bold text-cyan">{% block page_title %}Dashboard{% endblock %}</h1>
                </div>
                <div class="flex items-center gap-4">
                    <button class="bg-teal hover:bg-teal/90 text-navy px-4 py-2 rounded-lg font-semibold flex items-center gap-2">
                        <i data-lucide="scan" class="w-4 h-4"></i>
                        <span>Start Scan</span>
                    </button>
                    <button class="p-2 hover:bg-teal/10 rounded-lg relative">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                        <span class="absolute top-1 right-1 w-2 h-2 bg-red rounded-full"></span>
                    </button>
                    <button class="p-2 hover:bg-teal/10 rounded-lg">
                        <i data-lucide="user-circle" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>
            
            <!-- Page Content -->
            <div class="p-6 overflow-auto" style="height: calc(100vh - 80px);">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        // Sidebar toggle
        document.getElementById('toggle-sidebar').addEventListener('click', function() {
            const sidebar = document.getElementById('sidebar');
            const sidebarTexts = document.querySelectorAll('.sidebar-text');
            sidebar.classList.toggle('sidebar-collapsed');
            sidebar.classList.toggle('sidebar-expanded');
            sidebarTexts.forEach(text => text.classList.toggle('hidden'));
        });
    </script>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>
