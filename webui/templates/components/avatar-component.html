<!-- Avatar Video Component for CogniWatch Dashboard -->
<!-- Embed this in the dashboard to show talking avatar -->

<div id="avatar-container" class="avatar-container" style="display: none;">
    <div class="avatar-frame">
        <div class="avatar-header">
            <h3>🔮 CogniWatch AI Analyst</h3>
            <button class="avatar-close" onclick="closeAvatar()">×</button>
        </div>
        <div class="avatar-video-wrapper">
            <video id="avatar-video" controls autoplay style="width: 100%; border-radius: 8px;">
                <source id="avatar-source" src="" type="video/mp4">
                Your browser does not support video playback.
            </video>
        </div>
        <div class="avatar-controls">
            <button class="btn btn-sm btn-secondary" onclick="regenerateAvatar()">
                🔄 Regenerate
            </button>
            <button class="btn btn-sm btn-secondary" onclick="toggleAvatarMute()">
                🔊 Toggle Sound
            </button>
            <span class="avatar-status" id="avatar-status">Ready</span>
        </div>
    </div>
</div>

<script>
// Avatar state
let isAvatarMuted = false;
let currentAvatarVideo = null;

// Show avatar with new video
function showAvatar(videoUrl) {
    const container = document.getElementById('avatar-container');
    const video = document.getElementById('avatar-video');
    const source = document.getElementById('avatar-source');
    const status = document.getElementById('avatar-status');
    
    if (!videoUrl) {
        status.textContent = '⚠️ No video available';
        return;
    }
    
    // Set video source
    source.src = videoUrl;
    video.load();
    currentAvatarVideo = videoUrl;
    
    // Show container
    container.style.display = 'block';
    status.textContent = '▶️ Playing';
    
    // Auto-play
    video.play().catch(err => {
        console.log('Auto-play prevented:', err);
        status.textContent = '⏸️ Click to play';
    });
}

// Close avatar
function closeAvatar() {
    document.getElementById('avatar-container').style.display = 'none';
    const video = document.getElementById('avatar-video');
    video.pause();
}

// Toggle mute
function toggleAvatarMute() {
    const video = document.getElementById('avatar-video');
    isAvatarMuted = !isAvatarMuted;
    video.muted = isAvatarMuted;
    
    const status = document.getElementById('avatar-status');
    status.textContent = isAvatarMuted ? '🔇 Muted' : '🔊 Sound On';
}

// Regenerate (placeholder - would trigger backend)
function regenerateAvatar() {
    const status = document.getElementById('avatar-status');
    status.textContent = '🔄 Generating...';
    // TODO: Call backend API to regenerate
}

// Auto-show avatar when scan completes
function showScanResultsAvatar(summary) {
    // This would be called after scan completes
    // Backend generates D-ID video, returns URL
    fetch('/api/avatar/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: summary })
    })
    .then(response => response.json())
    .then(data => {
        if (data.video_url) {
            showAvatar(data.video_url);
        }
    })
    .catch(err => console.error('Avatar generation failed:', err));
}

// Example: Show avatar on page load (demo)
// showAvatar('/static/avatars/test-avatar.mp4');
</script>

<style>
.avatar-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

.avatar-frame {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    width: 320px;
    overflow: hidden;
    border: 2px solid #0ea5e9;
}

.avatar-header {
    background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
    color: white;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.avatar-header h3 {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
}

.avatar-close {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
}

.avatar-close:hover {
    background: rgba(255,255,255,0.3);
}

.avatar-video-wrapper {
    background: #000;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

.avatar-controls {
    padding: 12px;
    display: flex;
    gap: 8px;
    align-items: center;
    background: #f8fafc;
    border-top: 1px solid #e2e8f0;
}

.avatar-status {
    margin-left: auto;
    font-size: 12px;
    color: #64748b;
    font-weight: 500;
}
</style>
