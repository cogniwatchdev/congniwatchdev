<!-- ClawJacked Detection Feed -->
<div class="detection-feed-section">
    <div class="section-header">
        <h2>🚨 ClawJacked Detection Feed</h2>
        <div class="feed-controls">
            <select id="severity-filter" onchange="filterDetectionFeed()">
                <option value="all">All Severities</option>
                <option value="critical">Critical Only</option>
                <option value="high">High+</option>
                <option value="medium">Medium+</option>
            </select>
            <select id="gateway-filter" onchange="filterDetectionFeed()">
                <option value="all">All Gateways</option>
                <option value="neo-18789">Neo:18789</option>
                <option value="atlas-18790">Atlas:18790</option>
                <option value="cipher-18794">Cipher:18794</option>
                <option value="vulcan-18795">Vulcan:18795</option>
            </select>
            <button class="btn-export" onclick="exportAlertsCSV()">📄 Export CSV</button>
            <div class="auto-refresh-indicator">
                <span class="refresh-dot"></span>
                <span>Auto-refresh: 10s</span>
            </div>
        </div>
    </div>
    
    <div class="alerts-stats">
        <div class="alert-stat critical">
            <div class="stat-count" id="critical-count">0</div>
            <div class="stat-label">Critical</div>
        </div>
        <div class="alert-stat high">
            <div class="stat-count" id="high-count">0</div>
            <div class="stat-label">High</div>
        </div>
        <div class="alert-stat medium">
            <div class="stat-count" id="medium-count">0</div>
            <div class="stat-label">Medium</div>
        </div>
        <div class="alert-stat total">
            <div class="stat-count" id="total-count">0</div>
            <div class="stat-label">Total (24h)</div>
        </div>
    </div>
    
    <div class="alerts-table-container">
        <table class="alerts-table">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Gateway</th>
                    <th>Detection Type</th>
                    <th>Severity</th>
                    <th>Source IP</th>
                    <th>Details</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="alerts-table-body">
                <!-- Populated by JavaScript -->
            </tbody>
        </table>
    </div>
    
    <div class="feed-footer">
        <button class="btn-load-more" onclick="loadMoreAlerts()">Load More Alerts</button>
        <span class="last-update">Last updated: <span id="feed-last-update">--</span></span>
    </div>
</div>

<style>

    display: flex;

    color: #64ffda;
    border: 1px solid #64ffda;

<script>
// Detection Feed JavaScript
let currentAlerts = [];
let filteredAlerts = [];

document.addEventListener('DOMContentLoaded', function() {
    loadDetectionFeed();
    // Auto-refresh every 10 seconds
    setInterval(loadDetectionFeed, 10 * 1000);
});

async function loadDetectionFeed() {
    try {
        const response = await fetch('/api/security/alerts');
        if (!response.ok) throw new Error('Failed to load alerts');
        
        const data = await response.json();
        currentAlerts = data.alerts;
        updateDetectionFeed(data);
    } catch (error) {
        console.error('Detection feed error:', error);
        // Use mock data for demo
        currentAlerts = getMockAlerts();
        updateDetectionFeed({ alerts: currentAlerts, stats: getMockAlertStats() });
    }
}

function updateDetectionFeed(data) {
    // Update stats
    if (data.stats) {
        document.getElementById('critical-count').textContent = data.stats.critical;
        document.getElementById('high-count').textContent = data.stats.high;
        document.getElementById('medium-count').textContent = data.stats.medium;
        document.getElementById('total-count').textContent = data.stats.total;
    }
    
    // Update table
    const tbody = document.getElementById('alerts-table-body');
    tbody.innerHTML = '';
    
    const now = new Date();
    data.alerts.forEach(alert => {
        const row = document.createElement('tr');
        if (alert.severity === 'critical') row.classList.add('critical');
        row.innerHTML = renderAlertRow(alert, now);
        tbody.appendChild(row);
    });
    
    // Update last update time
    document.getElementById('feed-last-update').textContent = now.toLocaleTimeString();
}

function renderAlertRow(alert, now) {
    const alertTime = new Date(alert.timestamp);
    const timeStr = alertTime.toLocaleTimeString();
    
    const severityClass = alert.severity.toLowerCase();
    const statusClass = alert.status ? alert.status.toLowerCase() : 'new';
    const statusLabel = alert.status || 'NEW';
    
    // Calculate time ago
    const diffMs = now - alertTime;
    const diffMins = Math.floor(diffMs / 60000);
    let timeAgo;
    if (diffMins < 1) timeAgo = 'Just now';
    else if (diffMins < 60) timeAgo = `${diffMins}m ago`;
    else timeAgo = alertTime.toLocaleTimeString();
    
    return `
        <td>
            <div>${timeStr}</div>
            <small style="color: #8892b0">${timeAgo}</small>
        </td>
        <td>
            <strong>${alert.gateway_name}</strong><br>
            <small style="color: #8892b0">${alert.gateway_host}:${alert.gateway_port}</small>
        </td>
        <td>
            <div class="detection-type">
                <span class="detection-icon">${getDetectionIcon(alert.detection_type)}</span>
                ${alert.detection_type}
            </div>
        </td>
        <td>
            <span class="severity-badge ${severityClass}">${alert.severity}</span>
        </td>
        <td>
            <code style="color: #00bcd4">${alert.source_ip}</code>
        </td>
        <td>
            ${alert.details}
        </td>
        <td>
            <span class="status-badge ${statusClass}">${statusLabel}</span>
        </td>
        <td>
            ${!alert.status ? `<button class="action-btn-small acknowledge" onclick="acknowledgeAlert('${alert.id}')">✓ Acknowledge</button>` : ''}
            <button class="action-btn-small" onclick="viewAlertDetails('${alert.id}')">Details</button>
        </td>
    `;
}

function getDetectionIcon(type) {
    const icons = {
        'WebSocket Anomaly': '🕸️',
        'Auth Brute-Force': '🔐',
        'Rate Limit Exceeded': '🚦',
        'Unauthorized Access': '🚫',
        'Suspicious Pattern': '🔍',
        'DDoS Attempt': '⚡',
        'Config Tampering': '⚙️'
    };
    return icons[type] || '🔔';
}

function filterDetectionFeed() {
    const severityFilter = document.getElementById('severity-filter').value;
    const gatewayFilter = document.getElementById('gateway-filter').value;
    
    filteredAlerts = currentAlerts.filter(alert => {
        const severityMatch = severityFilter === 'all' || 
            (severityFilter === 'critical' && alert.severity === 'critical') ||
            (severityFilter === 'high' && ['critical', 'high'].includes(alert.severity)) ||
            (severityFilter === 'medium' && ['critical', 'high', 'medium'].includes(alert.severity));
        
        const gatewayMatch = gatewayFilter === 'all' || alert.gateway_id === gatewayFilter;
        
        return severityMatch && gatewayMatch;
    });
    
    updateDetectionFeed({ alerts: filteredAlerts, stats: calculateFilteredStats(filteredAlerts) });
}

function calculateFilteredStats(alerts) {
    return {
        critical: alerts.filter(a => a.severity === 'critical').length,
        high: alerts.filter(a => a.severity === 'high').length,
        medium: alerts.filter(a => a.severity === 'medium').length,
        total: alerts.length
    };
}

function acknowledgeAlert(alertId) {
    alert(`Would acknowledge alert: ${alertId}`);
    // Implementation: POST /api/security/alerts/{id}/acknowledge
}

function viewAlertDetails(alertId) {
    alert(`Would show details for alert: ${alertId}`);
    // Implementation: Show modal with full alert details
}

function exportAlertsCSV() {
    alert('Exporting alerts to CSV...');
    // Implementation: Generate CSV from currentAlerts and download
    const csvContent = "data:text/csv;charset=utf-8," + 
        "Timestamp,Gateway,Type,Severity,Source IP,Details,Status\n" +
        currentAlerts.map(a => 
            `${a.timestamp},${a.gateway_name},${a.detection_type},${a.severity},${a.source_ip},"${a.details}",${a.status || 'NEW'}`
        ).join("\n");
    
    const link = document.createElement("a");
    link.setAttribute("href", encodeURI(csvContent));
    link.setAttribute("download", "security_alerts.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function loadMoreAlerts() {
    alert('Load more alerts - would fetch older entries');
    // Implementation: Fetch older alerts with offset
}

    return [
        {

        {

        {

function getMockAlertStats() {
    return {
        critical: 1,
        high: 3,
        medium: 5,
        total: 12
    };
}
</script>
